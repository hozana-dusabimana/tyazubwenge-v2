<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyazubwenge Desktop</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles/main.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>
    <!-- Login Screen -->
    <div id="loginScreen" class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1><i class="bi bi-shop"></i> Tyazubwenge</h1>
                <p class="text-muted">Training Center - Desktop Application</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="apiUrl" class="form-label">API URL</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-link-45deg"></i></span>
                        <input type="text" class="form-control" id="apiUrl" value="http://localhost/tyazubwenge_v2"
                            placeholder="http://localhost/tyazubwenge_v2">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
                <div id="loginError" class="alert alert-danger mt-3 d-none"></div>
            </form>
            <div class="mt-3 text-center">
                <small class="text-muted">You can work offline after initial login</small>
            </div>
        </div>
    </div>

    <!-- Main Application -->
    <div id="appScreen" class="d-none">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-header">
                <h4><i class="bi bi-shop"></i> Tyazubwenge</h4>
                <div class="sync-status" id="syncStatus">
                    <i class="bi bi-wifi-off"></i> <span>Offline</span>
                </div>
            </div>
            <ul class="sidebar-menu">
                <li><a href="#" data-page="dashboard" class="active"><i class="bi bi-speedometer2"></i> Dashboard</a>
                </li>
                <li><a href="#" data-page="pos"><i class="bi bi-cart-plus"></i> POS</a></li>
                <li><a href="#" data-page="stock"><i class="bi bi-boxes"></i> Stock</a></li>
                <li><a href="#" data-page="products"><i class="bi bi-tags"></i> Products</a></li>
                <li><a href="#" data-page="customers"><i class="bi bi-people"></i> Customers</a></li>
                <li><a href="#" data-page="sales"><i class="bi bi-receipt"></i> Sales</a></li>
                <li><a href="#" data-page="sync"><i class="bi bi-arrow-repeat"></i> Sync</a></li>
            </ul>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="bi bi-person-circle"></i>
                    <span id="userName">User</span>
                </div>
                <button id="logoutBtn" class="btn btn-sm btn-outline-danger w-100 mt-2">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Page Content will be loaded here -->
            <div id="pageContent"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages/dashboard.js"></script>
    <script src="js/pages/pos.js"></script>
    <script src="js/pages/stock.js"></script>
    <script src="js/pages/products.js"></script>
    <script src="js/pages/customers.js"></script>
    <script src="js/pages/sales.js"></script>
    <script src="js/pages/sync.js"></script>
</body>

</html>
